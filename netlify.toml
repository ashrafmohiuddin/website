[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://img.sashraf.in https://*.sashraf.in; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "https://photography.sashraf.in/"
  to = "/photography.html"
  status = 200
  force = true

[[redirects]]
  from = "https://photography.sashraf.in/*"
  to = "/photography.html"
  status = 200
  force = true
