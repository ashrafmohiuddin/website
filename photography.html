<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photography by Ashraf Mohiuddin — wildlife, travel, and landscape." />
  <title>Photography | Ashraf Mohiuddin</title>
  <link rel="canonical" href="https://sashraf.in/photography.html" />
  <meta property="og:title" content="Photography | Ashraf Mohiuddin" />
  <meta property="og:description" content="Wildlife, travel, and landscape photography." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sashraf.in/photography.html" />
  <meta property="og:image" content="https://sashraf.in/images/ASH02346.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050505;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --gap: 5px;
      --header-h: 56px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 clamp(1rem, 3vw, 2.5rem);
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-inner {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s var(--ease);
    }

    nav a:hover, nav a.active { color: var(--text); }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.25rem;
    }

    /* ── Intro ── */
    .intro {
      padding: calc(var(--header-h) + 3.5rem) clamp(1rem, 3vw, 2.5rem) 2.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .intro h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .intro p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 300;
      max-width: 420px;
    }

    /* ── Masonry gallery ── */
    .gallery-wrap {
      padding: 0 clamp(1rem, 3vw, 2.5rem) 4rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .masonry {
      columns: 4;
      column-gap: var(--gap);
    }

    .photo {
      break-inside: avoid;
      margin-bottom: var(--gap);
      position: relative;
      cursor: pointer;
      overflow: hidden;
      line-height: 0;
    }

    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.7s var(--ease), opacity 0.4s var(--ease);
      opacity: 0;
    }

    .photo img.loaded { opacity: 1; }

    .photo:hover img { transform: scale(1.015); }

    .photo-caption {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.35s var(--ease);
      pointer-events: none;
    }

    .photo:hover .photo-caption { opacity: 1; }

    .photo-caption span {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.9);
    }

    /* ── Load sentinel ── */
    .sentinel {
      height: 1px;
      margin-top: 2rem;
    }

    .loading-indicator {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.96);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lb-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 210;
      transition: color 0.2s;
      line-height: 1;
    }

    .lb-close:hover { color: #fff; }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 1.6rem;
      cursor: pointer;
      padding: 1rem;
      z-index: 210;
      transition: color 0.2s;
    }

    .lb-nav:hover { color: #fff; }
    .lb-prev { left: 0.5rem; }
    .lb-next { right: 0.5rem; }

    .lb-image-wrap {
      max-width: 92vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-image-wrap img {
      max-width: 100%;
      max-height: 88vh;
      object-fit: contain;
      user-select: none;
    }

    .lb-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem clamp(1rem, 3vw, 2.5rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    }

    .lb-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .lb-counter {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1.5rem clamp(1rem, 3vw, 2.5rem);
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    /* ── Responsive ── */
    @media (max-width: 1200px) { .masonry { columns: 3; } }
    @media (max-width: 768px) {
      .masonry { columns: 2; }
      nav {
        display: none;
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        background: rgba(5,5,5,0.97);
        flex-direction: column;
        padding: 1.5rem;
        gap: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      nav.open { display: flex; }
      .menu-btn { display: block; }
      .lb-nav { font-size: 1.2rem; padding: 0.5rem; }
    }
    @media (max-width: 480px) { .masonry { columns: 1; } }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="site-name">Ashraf Mohiuddin</a>
      <nav id="nav">
        <a href="index.html">Portfolio</a>
        <a href="creative-corner.html">Creative Corner</a>
        <a href="photography.html" class="active">Photography</a>
      </nav>
      <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    </div>
  </header>

  <div class="intro">
    <h1>Photography</h1>
    <p>Wildlife, travel, and the open road — captured as I see it.</p>
  </div>

  <div class="gallery-wrap">
    <div class="masonry" id="masonry"></div>
    <div class="sentinel" id="sentinel"></div>
    <div class="loading-indicator" id="loader" hidden>Loading</div>
  </div>

  <footer>© 2026 Ashraf Mohiuddin Shaik</footer>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <div class="lb-image-wrap">
      <img id="lbImage" alt="" />
    </div>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">&#8250;</button>
    <div class="lb-footer">
      <span class="lb-title" id="lbTitle"></span>
      <span class="lb-counter" id="lbCounter"></span>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 24;
    let allPhotos = [];
    let rendered = 0;
    let lbIndex = 0;

    const masonry = document.getElementById("masonry");
    const sentinel = document.getElementById("sentinel");
    const loader = document.getElementById("loader");
    const lightbox = document.getElementById("lightbox");
    const lbImage = document.getElementById("lbImage");
    const lbTitle = document.getElementById("lbTitle");
    const lbCounter = document.getElementById("lbCounter");

    document.getElementById("menuBtn").addEventListener("click", () => {
      document.getElementById("nav").classList.toggle("open");
    });

    async function init() {
      try {
        const res = await fetch("./data/photos.manifest.json");
        if (!res.ok) throw new Error("manifest missing");
        const data = await res.json();
        allPhotos = data.photos || [];
        renderBatch();
        observeSentinel();
      } catch {
        masonry.innerHTML = '<p style="color:#8a8a8a;padding:2rem 0;">Gallery could not be loaded.</p>';
      }
    }

    function createPhotoEl(photo, index) {
      const el = document.createElement("div");
      el.className = "photo";
      el.dataset.index = index;

      const img = document.createElement("img");
      img.alt = photo.alt || photo.title || "";
      img.loading = "lazy";
      img.decoding = "async";
      img.src = photo.previewSrc;
      img.addEventListener("load", () => img.classList.add("loaded"));
      img.addEventListener("error", () => {
        const fallbacks = [photo.fullResSrc, photo.downloadSrc].filter(Boolean);
        const next = fallbacks.find((url) => url !== img.src);
        if (next) img.src = next;
      });

      const caption = document.createElement("div");
      caption.className = "photo-caption";
      caption.innerHTML = `<span>${photo.title || ""}</span>`;

      el.appendChild(img);
      el.appendChild(caption);
      el.addEventListener("click", () => openLightbox(index));
      return el;
    }

    function renderBatch() {
      const end = Math.min(rendered + PAGE_SIZE, allPhotos.length);
      const frag = document.createDocumentFragment();
      for (let i = rendered; i < end; i++) {
        frag.appendChild(createPhotoEl(allPhotos[i], i));
      }
      masonry.appendChild(frag);
      rendered = end;
      loader.hidden = rendered >= allPhotos.length;
    }

    function observeSentinel() {
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && rendered < allPhotos.length) {
          loader.hidden = false;
          renderBatch();
        }
      }, { rootMargin: "600px" });
      obs.observe(sentinel);
    }

    function openLightbox(index) {
      lbIndex = index;
      updateLightbox();
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      lbImage.src = "";
    }

    function updateLightbox() {
      const photo = allPhotos[lbIndex];
      if (!photo) return;
      lbImage.src = photo.fullResSrc;
      lbImage.alt = photo.alt || photo.title || "";
      lbTitle.textContent = photo.title || "";
      lbCounter.textContent = `${lbIndex + 1} / ${allPhotos.length}`;

      const preload = (i) => {
        if (i >= 0 && i < allPhotos.length) {
          const img = new Image();
          img.src = allPhotos[i].fullResSrc;
        }
      };
      preload(lbIndex + 1);
      preload(lbIndex - 1);
    }

    function step(dir) {
      lbIndex = (lbIndex + dir + allPhotos.length) % allPhotos.length;
      updateLightbox();
    }

    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbPrev").addEventListener("click", () => step(-1));
    document.getElementById("lbNext").addEventListener("click", () => step(1));
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") step(-1);
      if (e.key === "ArrowRight") step(1);
    });

    let touchStartX = 0;
    lightbox.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    lightbox.addEventListener("touchend", (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) step(diff > 0 ? -1 : 1);
    }, { passive: true });

    init();
  </script>
</body>
</html>
